name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  REPO_NAME: simple-war-app
  ECR_URL: 160180440306.dkr.ecr.us-east-1.amazonaws.com
  CLUSTER_NAME: sample-cluster
  DEPLOYMENT_NAME: simple-war-app
  CONTAINER_NAME: simple-war-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    # 1) Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # 2) Java & Maven
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build WAR
      run: mvn clean package -DskipTests

    # 3) (Optional) Upload to Nexus – uncomment and wire NEXUS_* secrets if needed
    # - name: Upload artifact to Nexus
    #   run: |
    #     mvn deploy \
    #       -Dnexus.url=${{ secrets.NEXUS_URL }} \
    #       -Dnexus.user=${{ secrets.NEXUS_USERNAME }} \
    #       -Dnexus.pass=${{ secrets.NEXUS_PASSWORD }}

    # 4) Configure AWS using IAM user + assume role
    - name: Configure AWS credentials (assume role)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}          # from ec2-teraform user
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}  # from ec2-teraform user
        role-to-assume: arn:aws:iam::160180440306:role/ECR-permission
        aws-region: ${{ env.AWS_REGION }}

    - name: Verify caller identity
      run: aws sts get-caller-identity

    # 5) Login to ECR
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION \
        | docker login --username AWS --password-stdin $ECR_URL

    # 6) Build Docker image
    - name: Build Docker image
      run: |
        docker build -t $REPO_NAME:${{ github.run_number }} .

    # 7) Tag & push image to ECR
    - name: Tag & push image
      run: |
        IMAGE_TAG=${{ github.run_number }}
        docker tag $REPO_NAME:$IMAGE_TAG $ECR_URL/$REPO_NAME:$IMAGE_TAG
        docker push $ECR_URL/$REPO_NAME:$IMAGE_TAG
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV